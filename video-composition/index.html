<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1344, height=768">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1344px;
        height: 768px;
        overflow: hidden;
        background: #0a1a2e;
        font-family: "Inter", system-ui, sans-serif;
        color: #ffffff;
      }

      /* ---------- Video clips ---------- */
      .vclip {
        position: absolute;
        top: 0;
        left: 0;
        width: 1344px;
        height: 768px;
        object-fit: cover;
        z-index: 1;
      }
      #clip-1a { z-index: 2; }
      #clip-1b { z-index: 3; opacity: 0; }
      #clip-1c-part1 { z-index: 4; opacity: 0; }
      #clip-1c-part2 { z-index: 4; opacity: 0; }
      #end-frame { z-index: 5; opacity: 0; }

      /* ---------- After-glow backdrop (warm app-world hold) ---------- */
      #afterglow {
        position: absolute;
        top: 0; left: 0;
        width: 1344px; height: 768px;
        z-index: 6;
        opacity: 0;
        background:
          radial-gradient(ellipse at 50% 65%, #3a2410 0%, #1a1008 55%, #0e0805 100%);
      }

      /* ---------- Domain grid overlay ---------- */
      #domain-grid-wrap {
        position: absolute;
        top: 0; left: 0;
        width: 1344px; height: 768px;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
      }
      .domain-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 14px;
        width: 1280px;
        max-width: 96%;
        padding: 36px 32px;
        background: rgba(20, 12, 6, 0.86);
        border-radius: 24px;
        backdrop-filter: blur(6px);
        box-shadow:
          0 0 80px rgba(224, 140, 71, 0.22),
          inset 0 0 40px rgba(224, 140, 71, 0.10);
      }
      .tile {
        background: #f4ead6;
        color: #2a1a0a;
        border-radius: 14px;
        padding: 14px 12px;
        text-align: center;
        font-weight: 500;
        font-size: 16px;
        letter-spacing: 0.01em;
        line-height: 1.18;
        min-height: 70px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow:
          0 6px 14px rgba(58, 32, 16, 0.45),
          0 0 0 1px rgba(224, 140, 71, 0.25),
          inset 0 0 0 1px rgba(255, 255, 255, 0.4);
        transform-origin: center;
      }
      .tile span { display: block; }

      /* ---------- Text overlays ---------- */
      .caption {
        position: absolute;
        left: 60px;
        bottom: 56px;
        z-index: 20;
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 500;
        font-size: 30px;
        letter-spacing: 0.01em;
        color: #ffffff;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
        opacity: 0;
      }
      #cap-grow { color: #f0a86a; text-shadow: 0 2px 18px rgba(224, 140, 71, 0.45); }

      /* ---------- yuga.life wordmark (final) ---------- */
      #wordmark {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.94);
        z-index: 30;
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 700;
        font-size: 88px;
        letter-spacing: -0.025em;
        color: #f0a86a;
        text-shadow:
          0 0 32px rgba(224, 140, 71, 0.55),
          0 0 80px rgba(224, 140, 71, 0.25);
        opacity: 0;
      }
      #wordmark .dot { color: #ffffff; }
      #wordmark-tag {
        position: absolute;
        top: calc(50% + 70px);
        left: 50%;
        transform: translate(-50%, 0);
        z-index: 30;
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 400;
        font-size: 22px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.78);
        opacity: 0;
      }

      /* Vignette tint that pushes the navy world cooler in real-world clips */
      #vignette {
        position: absolute;
        top: 0; left: 0;
        width: 1344px; height: 768px;
        pointer-events: none;
        z-index: 7;
        background: radial-gradient(ellipse at center,
          rgba(0,0,0,0) 55%, rgba(0,0,0,0.35) 100%);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="23.5" data-width="1344" data-height="768"><video id="joined-v4" class="clip" src="joined-v4.mp4" data-start="0" data-duration="19.36" data-track-index="0" muted playsinline style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; z-index: 3" data-media-start="0"></video>
      <!-- ============ VIDEO TRACK ============ -->
      

      

      <!-- clip-1c-part1: seated amber world, sparkles (0–3.5s of original) -->
      

      <!-- clip-1c-part2: standing arms open, domain grid (5s+ of original) -->
      

      <!-- ============ STATIC END FRAME — end-1d domain grid ============ -->
      

      <!-- ============ VIGNETTE (always on while real-world clips play) ============ -->
      <div id="vignette" class="clip" data-start="0" data-duration="23.5" data-track-index="5" style="z-index: 2"></div>

      <!-- Text overlays removed — to be added in post-production -->

      <!-- ============ AUDIO BED ============ -->
      <!-- Pre-rendered deterministic synth bed (3-section arc):
           0-12s   low ambient pad  (110/164/82 Hz, vol 0.18-mix)
           10s     subtle UI tap (E6+E7) marking the icon-press
           12-17s  harmonic rise   (220/329/440 Hz)
           12.5s   brown-noise whoosh into the teleport
           17-29s  warm chord      (C3/G3/C4/E4) with 2.5s tail-out
           Generated via ffmpeg lavfi synth — reproducible from audio/ source files. -->
      <audio id="audio-bed" class="clip" data-start="0" data-duration="23.5" data-track-index="9" data-volume="0.85" src="audio/bed.m4a"></audio>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        window.__timelines["main"] = tl;
      </script>
    </div>
  </body>
</html>
