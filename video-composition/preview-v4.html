<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; }
    #root { position: relative; width: 1344px; height: 768px; overflow: hidden; }
    .clip { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    video { object-fit: cover; }
  </style>
</head>
<body>
  <div
    id="root"
    data-composition-id="preview-v4"
    data-start="0"
    data-duration="30.5"
    data-width="1344"
    data-height="768"
  >
    <video
      id="main-video"
      class="clip"
      data-start="0"
      data-duration="30.5"
      data-track-index="0"
      src="../assets/videos/joined-v4.mp4"
      muted
      playsinline
    ></video>
  </div>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    window.__timelines["preview-v4"] = tl;
  </script>
</body>
</html>
